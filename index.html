<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Happy Birthday!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #f6d365, #fda085);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #333;
    }

    .card {
      background: white;
      padding: 40px 30px;
      border-radius: 16px;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #ff6f61;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin: 10px 0;
    }

    .emoji {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    footer {
      margin-top: 25px;
      font-size: 0.9rem;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🎉🎂🎈</div>
    <h1>Happy Birthday!</h1>
    <p>
      Wishing you a day filled with happiness, laughter, and great moments.
    </p>
    <p>
      May the year ahead bring you success, health, and many reasons to smile.
    </p>
    <footer>
      Best wishes from your colleague 😊
    </footer>
  </div>
</body>
</html>
